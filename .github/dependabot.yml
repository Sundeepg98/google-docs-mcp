version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # fastmcp pin is load-bearing security control:
    #   CVE-2025-69196 (token reuse) — fixed 2.14.2
    #   CVE-2026-27124 (confused deputy) — fixed 3.2.0
    # Block major bumps; review manually with smoke test before any 4.x bump.
    ignore:
      - dependency-name: "fastmcp"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  # PR-Δ3: keep the SHA-pinned `python:3.13-slim` digest in the
  # Dockerfile current. Dependabot watches Docker Hub for new
  # manifests on the `3.13-slim` tag and opens a weekly PR to bump
  # `FROM python:3.13-slim@sha256:...`. Without this, a SHA-pin is
  # supply-chain-safe but rots — we'd ship stale Debian base packages
  # (= unpatched CVEs in libc, openssl, etc.) until someone manually
  # checked Docker Hub.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "docker"
