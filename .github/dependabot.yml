version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # fastmcp pin is load-bearing security control:
    #   CVE-2025-69196 (token reuse) — fixed 2.14.2
    #   CVE-2026-27124 (confused deputy) — fixed 3.2.0
    # Block major bumps; review manually with smoke test before any 4.x bump.
    ignore:
      - dependency-name: "fastmcp"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
