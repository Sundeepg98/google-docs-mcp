name: deploy

# Build and deploy from CI — replaces the prior local-only `./deploy.sh`
# path. A commit that breaks unit tests cannot reach production because
# the deploy step depends on `unit` passing.
#
# Triggers:
#   - push to main → automatic deploy (CI-gated) UNLESS repo var DEPLOY_ENABLED == 'false'
#   - workflow_dispatch → manual trigger from the Actions tab (ALWAYS deploys, ignores DEPLOY_ENABLED)
#
#   To pause auto-deploy (e.g. during the OAuth verification window):
#     gh variable set DEPLOY_ENABLED --body false -R Sundeepg98/google-docs-mcp
#   To resume:  gh variable set DEPLOY_ENABLED --body true   (or: gh variable delete DEPLOY_ENABLED)
#
# TOGGLE POLICY (deploy-standard hardening, 2026-07-02):
#   * DEPLOY_ENABLED=false is an emergency brake measured in HOURS, not
#     weeks. The standing invariant is main == prod; for a real freeze
#     window prefer NOT merging to main (queue the PRs) over
#     merging-without-deploying. A 19-day silent freeze once hid an
#     undeployed security fix (see the 2026-06-29 internal audit).
#   * A skipped deploy is LOUD, not silent: the `deploy-status` job below
#     emits a warning annotation + "DEPLOY SKIPPED - prod NOT updated" in
#     the run and step summary, and the scheduled prod-drift.yml monitor
#     fails (and files an issue) when live prod drifts from main.
#   * Resume ritual: setting the toggle back to true is IMMEDIATELY
#     followed by one manual workflow_dispatch of this workflow plus the
#     verification block in docs/runbooks/deploy-rollback.md - never left
#     for "the next push".
#   * NO out-of-band `flyctl deploy` for code (it bypasses the unit +
#     mutation gates and produces ULID image tags with no commit
#     provenance). workflow_dispatch is the only sanctioned manual deploy
#     path; local flyctl is for rollback/ops only
#     (docs/runbooks/deploy-rollback.md).
#
# Required repository secret:
#   FLY_API_TOKEN — generated via:
#     flyctl tokens create deploy -a sundeepg98-docs-mcp -j | jq -r .token | gh secret set FLY_API_TOKEN
#   (the -j JSON output + jq + pipe means the token never appears in
#   shell history or chat — it goes straight from flyctl to gh)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight deploy if a newer commit lands while it's running —
# the newer one would just supersede this one anyway.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  unit:
    name: unit tests (Python 3.13 — deploy-gate)
    runs-on: ubuntu-latest
    outputs:
      results-digest: ${{ steps.compute-digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - name: setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: install package + test deps
        run: pip install -e ".[test]"

      - name: pytest with JSON report
        run: |
          python -m pytest tests/unit -q \
              --json-report --json-report-file=test-results.json

      - name: inject provenance + digest into test-results.json
        id: compute-digest
        env:
          GIT_COMMIT: ${{ github.sha }}
          CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import hashlib, json, os
          with open("test-results.json") as f:
              d = json.load(f)
          d["_git_commit"] = os.environ["GIT_COMMIT"][:7]
          d["_ci_run_url"] = os.environ["CI_RUN_URL"]
          d.pop("_meta", None)
          canon = json.dumps(d, sort_keys=True, separators=(",", ":"))
          digest = "sha256:" + hashlib.sha256(canon.encode("utf-8")).hexdigest()
          d["_meta"] = {"digest": digest}
          with open("test-results.json", "w") as f:
              json.dump(d, f)
          # Surface the digest to the next job via job outputs.
          with open(os.environ["GITHUB_OUTPUT"], "a") as gho:
              gho.write(f"digest={digest}\n")
          print(f"digest: {digest}")
          print(f"ci_run_url: {os.environ['CI_RUN_URL']}")
          PY

      - name: upload test-results.json for deploy job
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.json
          if-no-files-found: error
          retention-days: 7

  mutation:
    name: mutation check (prove guards catch their bugs)
    needs: unit  # only run after unit suite is green
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: install package + test deps
        run: pip install -e ".[test]"

      - name: run mutation script
        run: python scripts/mutation_check.py

      - name: upload mutation-check.json
        uses: actions/upload-artifact@v7
        with:
          name: mutation-check
          path: mutation-check.json
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: deploy to Fly
    needs: [unit, mutation]  # gate: BOTH unit and mutation must be green
    runs-on: ubuntu-latest
    # Auto-deploy on push to main UNLESS the repo variable DEPLOY_ENABLED is
    # set to 'false' (the verify-LAST "merge≠deploy" switch). A manual
    # workflow_dispatch ALWAYS deploys (operator override), ignoring the toggle.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && vars.DEPLOY_ENABLED != 'false')
    steps:
      - uses: actions/checkout@v7

      - name: install flyctl
        # SHA-pinned per supply-chain best-practice. Bump via dependabot
        # github-actions ecosystem when a new release ships.
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1  # master HEAD 2026-04-08 (post-v1.5; tag v1.5 predates node 20 upgrade)

      - name: fetch test-results.json from unit job
        uses: actions/download-artifact@v8
        with:
          name: test-results
          path: .

      - name: fetch mutation-check.json from mutation job
        uses: actions/download-artifact@v8
        with:
          name: mutation-check
          path: .

      - name: verify both artifacts present
        run: |
          test -s test-results.json    || { echo "no test-results.json"; exit 1; }
          test -s mutation-check.json  || { echo "no mutation-check.json"; exit 1; }
          echo "test-results.json:   $(wc -c < test-results.json) bytes"
          echo "mutation-check.json: $(wc -c < mutation-check.json) bytes"

      # ---------------------------------------------------------------
      # v2.3.3: switched from `flyctl deploy --remote-only` (which
      # delegates the build to depot.dev, Fly's paid CI builder) to
      # GitHub-Actions-builder + buildx GHA cache, then deploy a
      # pre-built image to Fly's container registry.
      #
      # Why: depot.dev is a paid service; an unpaid invoice took
      # production offline for 6 days in May 2026 (35 PRs of work
      # blocked). GitHub Actions runners + GHA cache are free with
      # this repo's plan and the buildkit layer cache keeps warm
      # builds at ~3-5 min vs depot.dev's ~2-3 min — acceptable.
      #
      # The Dockerfile was split (v2.3.3) so deps install once and
      # only a code edit re-runs the cheap project-install step.
      # ---------------------------------------------------------------

      - name: validate FLY_API_TOKEN secret
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::error::FLY_API_TOKEN secret not set."
            echo "   Run locally: flyctl tokens create deploy -a sundeepg98-docs-mcp -j | jq -r .token | gh secret set FLY_API_TOKEN"
            exit 1
          fi

      - name: compute deploy provenance vars
        id: provenance
        env:
          GIT_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          GIT_COMMIT_SHORT="${GIT_COMMIT:0:7}"
          BUILD_TIME_SAFE="${BUILD_TIME:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
          IMAGE_TAG="registry.fly.io/sundeepg98-docs-mcp:deployment-${GIT_COMMIT_SHORT}"
          {
            echo "git_commit_short=${GIT_COMMIT_SHORT}"
            echo "build_time=${BUILD_TIME_SAFE}"
            echo "image_tag=${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"
          echo "deploying GIT_COMMIT=${GIT_COMMIT_SHORT} BUILD_TIME=${BUILD_TIME_SAFE} IMAGE=${IMAGE_TAG}"

      - name: set up Docker Buildx
        # SHA-pinned per supply-chain best-practice (matches the
        # flyctl-actions pin policy on line ~123). Bump via dependabot
        # github-actions ecosystem when a new release ships.
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: login to Fly registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: registry.fly.io
          # Fly's registry accepts any username when the password is
          # a deploy token — `x` is the convention from Fly's docs.
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: build and push Docker image with buildx GHA cache
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.provenance.outputs.image_tag }}
          # GHA cache backend (free with this repo's plan). `mode=max`
          # exports every layer (not just final). Hits warm at ~3-5
          # min cached vs ~10 min cold for our image.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ steps.provenance.outputs.git_commit_short }}
            BUILD_TIME=${{ steps.provenance.outputs.build_time }}

      - name: deploy pre-built image to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # --image: skip the build step entirely; deploy the image
          # we just pushed to registry.fly.io. No flyctl-side build
          # → no depot.dev → no billing wall.
          flyctl deploy \
              --image "${{ steps.provenance.outputs.image_tag }}"

      - name: smoke check
        run: |
          # Health endpoint should be 200 within 30s of deploy.
          for i in 1 2 3 4 5; do
            if curl -fsS https://sundeepg98-docs-mcp.fly.dev/health; then
              echo ""
              echo "✓ health check passed"
              exit 0
            fi
            echo "health check attempt $i failed; retrying in 5s..."
            sleep 5
          done
          echo "❌ health check failed after 5 retries"
          exit 1

  # -------------------------------------------------------------------
  # deploy-standard hardening (2026-07-02): make a SKIPPED deploy loud.
  #
  # Before this job existed, DEPLOY_ENABLED=false rendered a push run as
  # green with the deploy job silently `skipped` - "merge = deploy"
  # became "merge = nothing" with no surface saying so (19 days of
  # prod-vs-main drift, including an undeployed security fix, went
  # unnoticed). This job always() runs and, when the gates were green
  # but the deploy was toggled off, emits a warning annotation plus a
  # step-summary block reading "DEPLOY SKIPPED - prod NOT updated".
  # The run stays green (the toggle is a sanctioned brake); it just can
  # no longer pretend prod was updated. The scheduled prod-drift.yml
  # monitor is the companion backstop that eventually FAILS while prod
  # and main diverge.
  # -------------------------------------------------------------------
  deploy-status:
    name: deploy status (loud when skipped)
    needs: [unit, mutation, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: report deploy outcome
        env:
          UNIT_RESULT: ${{ needs.unit.result }}
          MUTATION_RESULT: ${{ needs.mutation.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          echo "unit=${UNIT_RESULT} mutation=${MUTATION_RESULT} deploy=${DEPLOY_RESULT}"

          if [ "$DEPLOY_RESULT" = "success" ]; then
            echo "deploy ran and succeeded - prod updated to ${GITHUB_SHA}."
            {
              echo "## Deploy: prod updated to \`${GITHUB_SHA}\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$UNIT_RESULT" != "success" ] || [ "$MUTATION_RESULT" != "success" ]; then
            # A gate job failed/cancelled, so the deploy job was skipped by
            # its `needs` chain - the run is already red; no extra warning.
            echo "deploy did not run because a gate job did not succeed (unit=${UNIT_RESULT}, mutation=${MUTATION_RESULT})."
            exit 0
          fi

          if [ "$DEPLOY_RESULT" = "skipped" ]; then
            # Gates were green; the deploy was withheld by DEPLOY_ENABLED=false.
            echo "DEPLOY SKIPPED - prod NOT updated"
            echo "::warning title=DEPLOY SKIPPED - prod NOT updated::DEPLOY_ENABLED=false withheld this deploy; main is now ahead of prod. Resume: gh variable set DEPLOY_ENABLED --body true, then dispatch deploy.yml and run the verification block in docs/runbooks/deploy-rollback.md. Toggle policy: hours, not weeks."
            {
              echo "## DEPLOY SKIPPED - prod NOT updated"
              echo ""
              echo "The unit + mutation gates passed but \`DEPLOY_ENABLED=false\` withheld the deploy."
              echo "Commit \`${GITHUB_SHA}\` is on main and NOT live: main is ahead of prod."
              echo ""
              echo "- Resume: \`gh variable set DEPLOY_ENABLED --body true -R ${GITHUB_REPOSITORY}\`, then manually dispatch deploy.yml (dispatch ignores the toggle) and verify per docs/runbooks/deploy-rollback.md."
              echo "- Toggle policy: the brake is measured in HOURS, not weeks. The scheduled prod-drift monitor will start failing while prod and main diverge."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Deploy ran and failed (or was cancelled) - the deploy job itself
          # already marks the run red; annotate for the notification email.
          echo "::warning title=Deploy did not complete::deploy job result: ${DEPLOY_RESULT} - prod NOT updated to ${GITHUB_SHA}. See the deploy job log (Fly billing 403s surface there) and docs/runbooks/deploy-rollback.md."
          {
            echo "## Deploy did not complete (result: ${DEPLOY_RESULT}) - prod NOT updated"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
