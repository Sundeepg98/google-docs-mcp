name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # manual trigger

jobs:
  unit:
    name: unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: install package + test deps
        run: pip install -e ".[test]"

      - name: pytest (unit only — live tests need OAuth + Drive, not in CI)
        # Coverage gate (--cov-fail-under=55) lives HERE, on the unit-only
        # CLI invocation, NOT in pytest.ini default addopts. Why split:
        # the global default addopts would also force the 55% floor onto
        # the integration-test job in e2e.yml — which naturally measures
        # ~34% line coverage (high-level flows, not exhaustive unit paths)
        # and so always failed. Keeping enforcement scoped to the unit
        # job is what the 55% baseline in docs/COVERAGE.md was calibrated
        # against. Measurement (--cov / --cov-report=*) still happens by
        # default everywhere so the coverage.xml artifact below populates.
        run: pytest tests/unit -v --cov-fail-under=55

      - name: upload coverage report (per Python version)
        # always() so we get the artifact even when the coverage gate
        # fails — that's exactly when the report is most useful.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: syntax check all src
        run: python -m py_compile src/appscriptly/*.py
