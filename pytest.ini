[pytest]
testpaths = tests
# v2.0.6 (R33): pytest-cov hooks the coverage gate.
#   --cov                 → measure coverage on the package
#   --cov-report=term-missing → show uncovered lines in failure output
#   --cov-report=xml      → emit coverage.xml for CI artifact upload
#   --cov-fail-under=55   → minimum line-coverage floor (baseline 2026-05-20).
#                          Per-Python-version measurement on CI:
#                            Linux Py 3.10 → 56.52%
#                            Linux Py 3.11 → 55.21%   ← outlier; sets floor
#                            Linux Py 3.12 → 56.56%
#                            Linux Py 3.13 → 56.56%
#                            Windows Py 3.13 → 56.74%
#                          Floor at 55 (one integer below worst version, with
#                          ~0.2pp headroom). Ratchet policy in docs/COVERAGE.md
#                          (+1pp/release toward 80%; first ratchet 55 → 56
#                          once the Py 3.11 outlier is investigated and either
#                          covered or accepted as version-conditional).
# To run tests WITHOUT the gate locally (e.g. a quick targeted run):
#   pytest tests/unit/test_foo.py --no-cov
addopts = -ra -q --strict-markers --cov=src/google_docs_mcp --cov-report=term-missing --cov-report=xml --cov-fail-under=55
markers =
    live: integration tests that hit live Drive (slow; opt-in via --live)

# Skip live tests by default — they require OAuth creds + a real Drive
# account and take minutes. Run with `pytest --live` to enable them.
filterwarnings =
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:googleapiclient.*
