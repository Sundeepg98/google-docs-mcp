[pytest]
testpaths = tests
# v2.0.6 (R33): pytest-cov MEASURES coverage by default; ENFORCEMENT
# (--cov-fail-under) lives on the unit-only CI invocation in
# .github/workflows/test.yml, NOT here. Why split:
#
#   * Default addopts apply to EVERY invocation (unit, integration,
#     ad-hoc subsets). Integration tests naturally measure ~34% line
#     coverage (high-level flows, not exhaustive unit paths); enforcing
#     the unit-tuned 55% floor against integration runs is wrong.
#   * The unit-only CI job adds --cov-fail-under=55 on its CLI so the
#     gate fires exactly where the floor was calibrated.
#
# Default flags here:
#   --cov                 → measure coverage on the package
#   --cov-report=term-missing → show uncovered lines in pytest output
#   --cov-report=xml      → emit coverage.xml for CI artifact upload
#
# Per-Python-version unit-test coverage on CI (sets the 55% floor):
#   Linux Py 3.10 → 56.52%
#   Linux Py 3.11 → 55.21%   ← outlier; sets floor
#   Linux Py 3.12 → 56.56%
#   Linux Py 3.13 → 56.56%
#   Windows Py 3.13 → 56.74%
# Floor at 55 (one integer below worst version, ~0.2pp headroom).
# Ratchet policy in docs/COVERAGE.md (+1pp/release toward 80%; first
# ratchet 55 → 56 once the Py 3.11 outlier is investigated).
#
# To run tests WITHOUT measurement locally (faster, no overhead):
#   pytest tests/unit/test_foo.py --no-cov
addopts = -ra -q --strict-markers --cov=src/appscriptly --cov-report=term-missing --cov-report=xml
markers =
    live: integration tests that hit live Drive (slow; opt-in via --live)

# Skip live tests by default — they require OAuth creds + a real Drive
# account and take minutes. Run with `pytest --live` to enable them.
filterwarnings =
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:googleapiclient.*
