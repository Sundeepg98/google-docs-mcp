[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "google-docs-mcp"
version = "1.5.1"
description = "MCP server that creates Google Docs with native Tabs (Oct 2024 sidebar feature) — for Claude Desktop and Claude Code"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Sundeep Gunda" }]
requires-python = ">=3.10"
keywords = ["mcp", "google-docs", "claude", "anthropic", "tabs"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business",
]
dependencies = [
    "fastmcp>=3.3.1",  # v1.1: GoogleProvider + OAuthProxy + get_access_token deps
    "google-api-python-client>=2.0",
    "google-auth>=2.53.0",
    "google-auth-oauthlib>=1.0",
    "markdown-it-py>=4.2.0",
    "python-docx>=1.0",  # used by preview_tab_split + retrofit_existing_docx
    "typing-extensions>=4.15.0",  # NotRequired + TypedDict for Python 3.10/3.11
    "starlette>=0.40,<0.52",  # v1.3.1: pin upper bound — FastMCP transitive can drift
    # === v1.3.1 security floor — pinned to CVE-fixed minimums ===
    # Re-audit these on every minor release. Bump floors when new CVEs land.
    # After modifying any line below, regenerate uv.lock via `uv sync`
    # and commit the lockfile. The Dockerfile uses `uv sync --frozen`
    # so any drift fails CI before deploy.
    "cryptography>=46.0.7,<47",  # CVE-2026-26007, -34073, -39892
    "pyjwt>=2.12.1,<3",          # CVE-2026-32597
    "urllib3>=2.7.0,<3",         # CVE-2026-44431, -44432
    "requests>=2.34.2,<3",       # CVE-2026-25645
]

[project.optional-dependencies]
test = [
    "pytest>=9.0.3",
    "pytest-json-report>=1.5",  # emits test-results.json baked into Docker image
    # === v1.4.0b: integration test extras ===
    # Kept lean — chaos harness + integration tests use stdlib threading
    # and unittest.mock.patch on Flow.from_client_config (matches the
    # existing test_oauth_google.py pattern). pytest-asyncio is here
    # for forthcoming async paths but unused today.
    "pytest-asyncio>=0.23",
]

[project.urls]
Homepage = "https://github.com/Sundeepg98/google-docs-mcp"
Issues = "https://github.com/Sundeepg98/google-docs-mcp/issues"

[project.scripts]
google-docs-mcp = "google_docs_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/google_docs_mcp"]

# ---------------------------------------------------------------------
# Ruff lint config (v2.6a)
#
# Today's job: enforce the google_clients.get_service chokepoint.
# The TID251 rule bans the bare `from googleapiclient.discovery import
# build` import outside the wrapper file itself. Existing call sites
# are exempted via per-file-ignores below; PR2 migrates them and
# removes those ignores one file at a time.
#
# This config intentionally enables ONLY the TID rule family — broader
# linting is left to a separate PR so this change is reviewable in
# isolation and the e2e workflow's `ruff check src/ tests/` doesn't
# suddenly turn red on unrelated style issues.
# ---------------------------------------------------------------------

[tool.ruff.lint]
select = ["TID"]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"googleapiclient.discovery.build" = { msg = "Use google_docs_mcp.google_clients.get_service instead — single chokepoint for retry, logging, cache, etc. See PR #47 (v2.0.3 operator-secret leak) for the anti-pattern this lint prevents: a wrapper that's bypassed by direct imports." }

[tool.ruff.lint.per-file-ignores]
# This file owns the legitimate use of googleapiclient.discovery.build.
"src/google_docs_mcp/google_clients.py" = ["TID251"]
# The 6 files below currently import `build` directly. PR2 migrates
# them to google_clients.get_service and removes these ignores one
# at a time. Each removal is a separate review surface.
"src/google_docs_mcp/docs_api.py" = ["TID251"]
"src/google_docs_mcp/drive_api.py" = ["TID251"]
"src/google_docs_mcp/docx_import.py" = ["TID251"]
"src/google_docs_mcp/preview.py" = ["TID251"]
"src/google_docs_mcp/retrofit.py" = ["TID251"]
"src/google_docs_mcp/gas_deploy/client.py" = ["TID251"]
