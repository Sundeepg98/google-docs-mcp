[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "google-docs-mcp"
version = "1.3.0"
description = "MCP server that creates Google Docs with native Tabs (Oct 2024 sidebar feature) — for Claude Desktop and Claude Code"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Sundeep Gunda" }]
requires-python = ">=3.10"
keywords = ["mcp", "google-docs", "claude", "anthropic", "tabs"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business",
]
dependencies = [
    "fastmcp>=2.13",  # v1.1: GoogleProvider + OAuthProxy + get_access_token deps
    "google-api-python-client>=2.0",
    "google-auth>=2.0",
    "google-auth-oauthlib>=1.0",
    "markdown-it-py>=3.0",
    "python-docx>=1.0",  # used by preview_tab_split + retrofit_existing_docx
    "typing-extensions>=4.6",  # NotRequired + TypedDict for Python 3.10/3.11
    "starlette>=0.40,<0.52",  # v1.3.1: pin upper bound — FastMCP transitive can drift
    # === v1.3.1 security floor — pinned to CVE-fixed minimums ===
    # Re-audit these on every minor release. Bump floors when new CVEs land.
    # After modifying any line below, regenerate uv.lock via `uv sync`
    # and commit the lockfile. The Dockerfile uses `uv sync --frozen`
    # so any drift fails CI before deploy.
    "cryptography>=46.0.7,<47",  # CVE-2026-26007, -34073, -39892
    "pyjwt>=2.12.0,<3",          # CVE-2026-32597
    "urllib3>=2.7.0,<3",         # CVE-2026-44431, -44432
    "requests>=2.33.0,<3",       # CVE-2026-25645
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-json-report>=1.5",  # emits test-results.json baked into Docker image
    # === v1.4.0b: integration test + chaos harness deps ===
    # respx mocks httpx; httpx is the async client respx instruments. Both
    # only used by tests/integration/** — kept in the test extra so the
    # runtime wheel stays lean. pytest-asyncio runs the async OAuth-dance
    # integration paths under asyncio without a separate plugin.
    "respx>=0.21",
    "httpx>=0.27",
    "pytest-asyncio>=0.23",
]

[project.urls]
Homepage = "https://github.com/Sundeepg98/google-docs-mcp"
Issues = "https://github.com/Sundeepg98/google-docs-mcp/issues"

[project.scripts]
google-docs-mcp = "google_docs_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/google_docs_mcp"]
